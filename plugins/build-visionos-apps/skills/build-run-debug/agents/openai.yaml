interface:
  display_name: "Build / Run / Debug"
  short_description: "Build and debug visionOS apps with XcodeBuildMCP-backed simulator workflows"
  default_prompt: "Use $build-run-debug to inspect the real workspace/project/scheme, set XcodeBuildMCP session defaults, choose an Apple Vision Pro Simulator target, run build/launch/log/debug flows, and route to $test-triage for test failures or $signing-entitlements for capability/privacy/signing blockers. Keep Xcode beta and arm64 shell workarounds explicit fallback choices."
